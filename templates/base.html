<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-dark': '#2563EB',
                    }
                }
            }
        }
    </script>
    <style>
        input[type="file"]::file-selector-button {
            margin-right: 12px; padding: 8px 14px;
            border: 1px solid #3B82F6; border-radius: 8px;
            color: white; background: #3B82F6; cursor: pointer;
            text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;
        }
        input[type="file"]::file-selector-button:hover { background: #2563EB; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 999px; }
        * { text-transform: uppercase; }
        input, select, ::placeholder { text-transform: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

<!-- Page Loader -->
<div id="page-loader" style="display:none;position:fixed;inset:0;z-index:9998;backdrop-filter:blur(4px);background:rgba(255,255,255,0.4);"></div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('page-loader');
        function showLoader() { loader.style.display = 'flex'; setTimeout(() => { loader.style.display = 'none'; }, 1500); }
        document.querySelectorAll('a[href]').forEach(a => {
            if (!a.href.startsWith('mailto') && !a.target) a.addEventListener('click', showLoader);
        });
        document.querySelectorAll('form').forEach(f => f.addEventListener('submit', showLoader));
        document.querySelectorAll('button[type="button"]').forEach(b => b.addEventListener('click', showLoader));
    });
</script>

<!-- Splash Screen -->
<div id="splash" style="position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#3B82F6,#2563EB);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s ease;">
    <div style="font-size:4rem;animation:bounce 0.8s infinite alternate;">📚</div>
    <p style="color:white;font-size:1.2rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;">College Storage</p>
    <div style="width:48px;height:4px;background:rgba(255,255,255,0.3);border-radius:999px;overflow:hidden;margin-top:8px;">
        <div id="splash-bar" style="height:100%;width:0%;background:white;border-radius:999px;transition:width 0.8s ease;"></div>
    </div>
</div>

<style>
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
</style>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('splash');
        const bar = document.getElementById('splash-bar');
        if (sessionStorage.getItem('splashShown')) {
            splash.style.display = 'none';
        } else {
            sessionStorage.setItem('splashShown', '1');
            setTimeout(() => bar.style.width = '100%', 100);
            setTimeout(() => { splash.style.opacity = '0'; }, 1000);
            setTimeout(() => { splash.style.display = 'none'; }, 1500);
        }
    });
</script>
    <div class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
